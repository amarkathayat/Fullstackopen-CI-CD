name: Periodic Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min (for testing)

jobs:
  health_check:
    runs-on: ubuntu-latest

    steps:
      - name: Check application health
        uses: jtalk/url-health-check-action@v3
        with:
          url: https://fullstackopen-ci-cd-5ob9.onrender.com
          max-attempts: 3
          retry-delay: 5s